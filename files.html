<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="color-scheme" content="light dark">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <title>Files – Vitus Leibnitz</title>
  <script src="js/script.js" defer></script>
  <link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="controls">
  <!-- Home button with icon -->
  <a href="index.html" class="home-button" title="Home">
    <img src="Icons/home.svg" alt="Home" />
    
  </a>

  <!-- Existing Upload/Mode button -->
  <button class=form-button id="mode-toggle">Editing Mode</button>
</div>

  <main class="container">
    <h1>Files</h1>

    <!-- DOWNLOAD SECTION -->
    <div id="download-section">
      <div id="download-auth" class="password-screen">
        <p>Enter password to access files</p>
        <input type="password" id="download-password" placeholder="Password" />
        <button class=form-button style="position:static" onclick="authDownload()">Unlock</button>
        <p class="error hidden" id="download-error">Wrong password</p>
      </div>

      <div id="download-content" class="hidden">
        <div class="search-bar">
          <input type="text" id="search" placeholder="Search files..." oninput="renderFiles()" />
        </div>

        <div id="bulk-actions" style="margin-top: 1rem; display: flex; gap: 1rem;">
       <button class="form-button" onclick="selectAll()">Select All</button>
       <button class="form-button" onclick="downloadSelected()" id="bulk-download-btn">Download Selected</button>
     </div>

        <div id="file-list" class="file-list"></div>
      </div>
    </div>

    <!-- UPLOAD SECTION -->
<div id="edit-section" class="hidden">
  <div id="edit-auth" class="password-screen">
    <p>Enter edit password</p>
    <input type="password" id="edit-password" placeholder="Password" />
    <button class="form-button" style="position:static" onclick="authEdit()">Unlock</button>
    <p class="error hidden" id="edit-error">Wrong password</p>
  </div>

  <div id="edit-content" class="hidden">
    <h2>Upload New File</h2>
    <div class="upload-form">
      <input type="file" id="file-input" />
      <input type="text" id="upload-description" placeholder="Description (optional)" />
      <select id="upload-category">
        <option value="misc">Misc</option>
        <option value="notes">Notes</option>
        <option value="projects">Projects</option>
        <option value="pdfs">PDFs</option>
      </select>
      <button class="form-button" onclick="uploadFile()">Upload</button>
      <p id="upload-status"></p>
    </div>

    <h2 style="margin-top: 2rem;">Manage Files</h2>
    <div class="search-bar">
      <input type="text" id="edit-search" placeholder="Search files to delete..." oninput="renderEditFiles()" />
    </div>
    <div id="edit-file-list" class="file-list"></div>
  </div>
</div>

  
</body>
</html>
