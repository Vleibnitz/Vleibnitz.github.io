<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="color-scheme" content="light dark">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <title>Files – Vitus Leibnitz</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .password-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .password-screen input {
      background: none;
      border: 1px solid var(--text-color);
      color: var(--text-color);
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      width: 100%;
      max-width: 300px;
    }

    .password-screen input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .error {
      color: #cc3300;
      font-size: 0.9rem;
    }

    .file-list {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .file-card {
      border: 1px solid var(--text-color);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      text-align: left;
    }

    .file-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .file-name {
      font-weight: bold;
    }

    .file-meta {
      font-size: 0.8rem;
      opacity: 0.6;
    }

    .file-description {
      font-size: 0.9rem;
    }

    .search-bar {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1;
      background: none;
      border: 1px solid var(--text-color);
      color: var(--text-color);
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .upload-form {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      border: 1px solid var(--text-color);
      border-radius: 4px;
      padding: 1rem;
    }

    .upload-form input,
    .upload-form select,
    .upload-form textarea {
      background: none;
      border: 1px solid var(--text-color);
      color: var(--text-color);
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
    }

    .upload-form input:focus,
    .upload-form select:focus,
    .upload-form textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .upload-form select option {
      background: var(--bg-color);
    }

    .hidden { display: none; }

    h2 {
      margin-top: 0.5rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="mode-toggle">Upload Mode</button>
  </div>

  <main class="container">
    <a href="index.html" class="back-link">← Back</a>
    <h1>Files</h1>

    <!-- DOWNLOAD SECTION -->
    <div id="download-section">
      <div id="download-auth" class="password-screen">
        <p>Enter password to access files</p>
        <input type="password" id="download-password" placeholder="Password" />
        <button class="controls" style="position:static" onclick="authDownload()">Unlock</button>
        <p class="error hidden" id="download-error">Wrong password</p>
      </div>

      <div id="download-content" class="hidden">
        <div class="search-bar">
          <input type="text" id="search" placeholder="Search files..." oninput="renderFiles()" />
        </div>
        <div id="file-list" class="file-list"></div>
      </div>
    </div>

    <!-- UPLOAD SECTION -->
    <div id="upload-section" class="hidden">
      <div id="upload-auth" class="password-screen">
        <p>Enter upload password</p>
        <input type="password" id="upload-password" placeholder="Password" />
        <button class="controls" style="position:static" onclick="authUpload()">Unlock</button>
        <p class="error hidden" id="upload-error">Wrong password</p>
      </div>

      <div id="upload-content" class="hidden">
        <h2>Upload File</h2>
        <div class="upload-form">
          <input type="file" id="file-input" />
          <input type="text" id="upload-description" placeholder="Description (optional)" />
          <select id="upload-category">
            <option value="misc">Misc</option>
            <option value="notes">Notes</option>
            <option value="projects">Projects</option>
            <option value="pdfs">PDFs</option>
          </select>
          <button onclick="uploadFile()">Upload</button>
          <p id="upload-status"></p>
        </div>
      </div>
    </div>
  </main>

  <script>
    const WORKER_URL = 'https://my-site-worker.hbwtdjmzz8.workers.dev';

    let downloadToken = null;
    let uploadToken = null;
    let allFiles = [];
    let mode = 'download';

    // ─── TOUCH DETECTION ────────────────────────────────────────────────────
    (function() {
      if (('ontouchstart' in window) || navigator.maxTouchPoints > 0) {
        document.documentElement.classList.add('touch');
      }
    })();

    // ─── MODE TOGGLE ────────────────────────────────────────────────────────
    document.getElementById('mode-toggle').addEventListener('click', () => {
      mode = mode === 'download' ? 'upload' : 'download';
      document.getElementById('mode-toggle').textContent =
        mode === 'download' ? 'Upload Mode' : 'Download Mode';
      document.getElementById('download-section').classList.toggle('hidden', mode !== 'download');
      document.getElementById('upload-section').classList.toggle('hidden', mode !== 'upload');
    });

    // ─── AUTH ────────────────────────────────────────────────────────────────
    async function authDownload() {
      const password = document.getElementById('download-password').value;
      const res = await fetch(`${WORKER_URL}/api/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, type: 'download' })
      });
      const data = await res.json();
      if (data.token) {
        downloadToken = data.token;
        document.getElementById('download-auth').classList.add('hidden');
        document.getElementById('download-content').classList.remove('hidden');
        loadFiles();
      } else {
        document.getElementById('download-error').classList.remove('hidden');
      }
    }

    async function authUpload() {
      const password = document.getElementById('upload-password').value;
      const res = await fetch(`${WORKER_URL}/api/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, type: 'upload' })
      });
      const data = await res.json();
      if (data.token) {
        uploadToken = data.token;
        document.getElementById('upload-auth').classList.add('hidden');
        document.getElementById('upload-content').classList.remove('hidden');
      } else {
        document.getElementById('upload-error').classList.remove('hidden');
      }
    }

    // ─── LOAD FILES ──────────────────────────────────────────────────────────
    async function loadFiles() {
      const res = await fetch(`${WORKER_URL}/api/files`, {
        headers: { 'Authorization': `Bearer ${downloadToken}` }
      });
      allFiles = await res.json();
      renderFiles();
    }

    // ─── RENDER ──────────────────────────────────────────────────────────────
    function renderFiles() {
      const query = document.getElementById('search').value.toLowerCase();
      const filtered = allFiles.filter(f =>
        f.name.toLowerCase().includes(query) ||
        (f.description || '').toLowerCase().includes(query) ||
        (f.category || '').toLowerCase().includes(query)
      );

      const list = document.getElementById('file-list');
      if (filtered.length === 0) {
        list.innerHTML = '<p>No files found.</p>';
        return;
      }

      list.innerHTML = filtered.map(f => `
        <div class="file-card">
          <div class="file-info">
            <span class="file-name">${f.name}</span>
            ${f.description ? `<span class="file-description">${f.description}</span>` : ''}
            <span class="file-meta">${f.category} · ${formatDate(f.uploaded_at)} · ${formatSize(f.size)}</span>
          </div>
          <button onclick="downloadFile('${f.id}', '${f.name}')">Download</button>
        </div>
      `).join('');
    }

    // ─── DOWNLOAD FILE ───────────────────────────────────────────────────────
    async function downloadFile(id, name) {
      const res = await fetch(`${WORKER_URL}/api/download/${id}`, {
        headers: { 'Authorization': `Bearer ${downloadToken}` }
      });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── UPLOAD FILE ─────────────────────────────────────────────────────────
    async function uploadFile() {
      const file = document.getElementById('file-input').files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);
      formData.append('description', document.getElementById('upload-description').value);
      formData.append('category', document.getElementById('upload-category').value);

      document.getElementById('upload-status').textContent = 'Uploading...';

      const res = await fetch(`${WORKER_URL}/api/upload`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${uploadToken}` },
        body: formData
      });

      const data = await res.json();
      document.getElementById('upload-status').textContent =
        data.success ? 'Uploaded successfully.' : 'Upload failed.';
    }

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    function formatDate(iso) {
      return new Date(iso).toLocaleDateString();
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ─── ENTER KEY ───────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (mode === 'download') authDownload();
      else authUpload();
    });
  </script>
</body>
</html>
